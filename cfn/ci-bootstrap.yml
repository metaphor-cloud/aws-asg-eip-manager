AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  CI bootstrap for aws-asg-eip-manager: a GitHub Actions OIDC role and an S3
  artifact bucket used by the release workflow to publish the SAM app to the AWS
  Serverless Application Repository (SAR). Deploy this once, in us-east-1 (SAR is
  regional and the release workflow uses us-east-1). Wire the outputs into the
  GitHub repo as the variables AWS_ROLE_ARN and SAR_ARTIFACT_BUCKET.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: GitHub Repository
        Parameters:
          - GitHubOrg
          - GitHubRepo
          - GitHubSubjectClaim
      - Label:
          default: OIDC Provider
        Parameters:
          - CreateOIDCProvider
      - Label:
          default: Artifact Bucket
        Parameters:
          - ArtifactBucketName
    ParameterLabels:
      GitHubOrg:
        default: GitHub organization / owner
      GitHubRepo:
        default: GitHub repository name
      GitHubSubjectClaim:
        default: Allowed OIDC subject claim
      CreateOIDCProvider:
        default: Create the GitHub OIDC provider?
      ArtifactBucketName:
        default: Artifact bucket name (optional)

Parameters:
  GitHubOrg:
    Type: String
    Default: metaphor-cloud
    Description: GitHub organization or user that owns the repository.

  GitHubRepo:
    Type: String
    Default: aws-asg-eip-manager
    Description: GitHub repository name.

  GitHubSubjectClaim:
    Type: String
    Default: '*'
    Description: >-
      The portion of the OIDC `sub` claim after `repo:<org>/<repo>:` that may
      assume the role. Default `*` allows any branch/tag/environment. Tighten to
      e.g. `ref:refs/tags/*` (releases run on a tag) or `environment:release`.

  CreateOIDCProvider:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >-
      Create the token.actions.githubusercontent.com OIDC provider. Set to false
      if this account already has one (only one provider per URL is allowed).

  ArtifactBucketName:
    Type: String
    Default: ''
    Description: >-
      Optional explicit name for the SAM artifact bucket. Leave empty to let
      CloudFormation generate a unique name.

Conditions:
  ShouldCreateOIDCProvider: !Equals [!Ref CreateOIDCProvider, 'true']
  HasBucketName: !Not [!Equals [!Ref ArtifactBucketName, '']]

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        # GitHub's OIDC thumbprints. IAM no longer validates these for
        # well-known IdPs, but the property is still required.
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasBucketName, !Ref ArtifactBucketName, !Ref 'AWS::NoValue']
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          # Packaging artifacts are transient once published to SAR.
          - Id: expire-old-artifacts
            Status: Enabled
            ExpirationInDays: 30
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # SAR reads the packaged artifacts from this bucket when publishing.
          - Sid: AllowServerlessRepoRead
            Effect: Allow
            Principal:
              Service: serverlessrepo.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${ArtifactBucket.Arn}/*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt ArtifactBucket.Arn
              - !Sub '${ArtifactBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  PublishRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${GitHubRepo}-sar-publish'
      Description: !Sub 'GitHub Actions OIDC role for publishing ${GitHubRepo} to SAR.'
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOrg}/${GitHubRepo}:${GitHubSubjectClaim}'
      Policies:
        - PolicyName: PackageArtifacts
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub '${ArtifactBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !GetAtt ArtifactBucket.Arn
        - PolicyName: PublishToServerlessRepo
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CreateApplication has no pre-existing resource to scope to.
              - Effect: Allow
                Action:
                  - serverlessrepo:CreateApplication
                  - serverlessrepo:ListApplications
                Resource: '*'
              - Effect: Allow
                Action:
                  - serverlessrepo:UpdateApplication
                  - serverlessrepo:GetApplication
                  - serverlessrepo:CreateApplicationVersion
                  - serverlessrepo:ListApplicationVersions
                  - serverlessrepo:GetApplicationPolicy
                  - serverlessrepo:PutApplicationPolicy
                Resource: !Sub 'arn:${AWS::Partition}:serverlessrepo:${AWS::Region}:${AWS::AccountId}:applications/*'

Outputs:
  RoleArn:
    Description: Set this as the GitHub repo variable AWS_ROLE_ARN.
    Value: !GetAtt PublishRole.Arn
  ArtifactBucketName:
    Description: Set this as the GitHub repo variable SAR_ARTIFACT_BUCKET.
    Value: !Ref ArtifactBucket
